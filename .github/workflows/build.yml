name: Build RustDesk Client

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Cho phép chạy thủ công

jobs:
  # ============ BUILD CHO WINDOWS ============
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        submodules: recursive
    
    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v10
      with:
        vcpkgDirectory: ${{ runner.workspace }}/vcpkg
    
    - name: Install dependencies via vcpkg
      run: |
        cd ${{ runner.workspace }}/vcpkg
        ./vcpkg install libvpx:x64-windows-static-md
        ./vcpkg install libyuv:x64-windows-static-md
        ./vcpkg install opus:x64-windows-static-md
        ./vcpkg install aom:x64-windows-static-md
      shell: bash
    
    - name: Set VCPKG_ROOT
      run: echo "VCPKG_ROOT=${{ runner.workspace }}/vcpkg" >> $env:GITHUB_ENV
    
    - name: Build RustDesk for Windows
      run: python build.py --portable
      env:
        VCPKG_ROOT: ${{ runner.workspace }}/vcpkg
    
    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v3
      with:
        name: rustdesk-windows
        path: |
          *.exe
          target/release/rustdesk.exe
          target/release/rustdesk-portable.exe

  # ============ BUILD CHO LINUX (Ubuntu) ============
  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        submodules: recursive
    
    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          pkg-config \
          libgtk-3-dev \
          libx11-dev \
          libxcb-shape0-dev \
          libxcb-xfixes0-dev \
          libxkbcommon-dev \
          libssl-dev \
          libsqlite3-dev \
          libva-dev \
          libvdpau-dev \
          libv4l-dev \
          libpulse-dev \
          libasound2-dev \
          libopus-dev \
          libvpx-dev \
          libyuv-dev
    
    - name: Build RustDesk for Linux
      run: python3 build.py --hwcodec
    
    - name: Upload Linux artifacts
      uses: actions/upload-artifact@v3
      with:
        name: rustdesk-linux
        path: |
          target/debian/*.deb
          target/release/rustdesk
          *.AppImage