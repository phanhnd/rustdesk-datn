name: Build RustDesk Client

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Cho phép chạy thủ công

jobs:
  # ============ BUILD CHO WINDOWS ============
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        submodules: recursive
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: "1.75.0" # required for Sciter ABI compat, see https://github.com/rustdesk/rustdesk/discussions/7503

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install LLVM and Clang
      uses: KyleMayes/install-llvm-action@v1
      with:
        version: "15.0.6"

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgDirectory: ${{ runner.workspace }}/vcpkg
        vcpkgGitCommitId: "120deac3062162151622ca4860575a33844ba10b"

    - name: Install dependencies via vcpkg
      run: |
        $VCPKG_ROOT/vcpkg install --triplet x64-windows-static --x-install-root="$VCPKG_ROOT/installed"
      shell: bash

    - name: Download sciter.dll
      run: curl -LJ -o sciter.dll https://github.com/c-smile/sciter-sdk/raw/master/bin.win/x64/sciter.dll
      shell: bash

    - name: Build RustDesk for Windows
      run: python build.py --portable

    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-windows
        path: |
          target/release/RustDesk.exe
          target/release/sciter.dll
          rustdesk-*-win7-install.exe

  # ============ BUILD CHO LINUX (Ubuntu) ============
  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        submodules: recursive
    
    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          pkg-config \
          libgtk-3-dev \
          libx11-dev \
          libxcb-shape0-dev \
          libxcb-xfixes0-dev \
          libxkbcommon-dev \
          libssl-dev \
          libsqlite3-dev \
          libva-dev \
          libvdpau-dev \
          libv4l-dev \
          libpulse-dev \
          libasound2-dev \
          libopus-dev \
          libvpx-dev \
          libyuv-dev
    
    - name: Build RustDesk for Linux
      run: python3 build.py --hwcodec
    
    - name: Upload Linux artifacts
      uses: actions/upload-artifact@v3
      with:
        name: rustdesk-linux
        path: |
          target/debian/*.deb
          target/release/rustdesk
          *.AppImage