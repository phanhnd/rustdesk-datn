<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ROCKY Admin</title>
<style>
  :root {
    --bg: #F7FAFF;
    --surface: #FFFFFF;
    --surface-2: #EAF7F7;
    --accent: #00B8B8;
    --accent-2: #029999;
    --text: #16234F;
    --text-muted: #5C6F94;
    --border: #D7E3F3;
    --danger: #D32F2F;
    --danger-strong: #C62828;
    --success: #2E7D32;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Ubuntu, -apple-system, 'Segoe UI', Cantarell, 'Noto Sans', system-ui, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
  }
  /* Buttons/inputs don't inherit body's font-family by default in browsers —
     without this they render in the browser's UA font, visibly mismatched
     against the rest of the page (and against the ROCKY desktop app, which
     uses one OS-native font throughout). */
  button, input, select, textarea, code { font-family: inherit; }

  /* Login */
  #login-page {
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
  }
  .login-card {
    background: var(--surface); border-radius: 14px; padding: 56px 48px; width: 440px;
    box-shadow: 0 8px 32px rgba(22,35,79,.14);
  }
  .brand-logo { display: block; width: 96px; height: 96px; margin: 0 auto 20px; }
  .brand-logo-sm { width: 26px; height: 26px; }
  .login-card h1 { color: var(--accent); font-size: 2.1rem; font-weight: 800; margin-bottom: 8px; text-align: center; }
  .login-card .tagline { color: var(--accent-2); font-style: italic; font-weight: 700; font-size: 1rem; margin-bottom: 18px; text-align: center; }
  .login-card p  { color: var(--text-muted); font-weight: 600; margin-bottom: 28px; font-size: .95rem; text-align: center; }
  .login-card label { display: block; font-size: .92rem; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; }
  .login-card input {
    width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 8px;
    font-size: 1.05rem; margin-bottom: 18px; outline: none; transition: border-color .2s;
    background: var(--surface); color: var(--text);
  }
  .login-card input:focus { border-color: var(--accent); }
  .login-card .err { color: var(--danger); font-size: .9rem; margin-bottom: 14px; }
  .login-card .btn-primary { padding: 12px 18px; font-size: 1rem; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 18px; border: none; border-radius: 6px; cursor: pointer;
    font-size: .9rem; font-weight: 600; transition: background .2s;
  }
  .btn-primary { background: var(--accent); color: #FFFFFF; }
  .btn-primary:hover { background: var(--accent-2); }
  .btn-danger  { background: var(--danger-strong); color: white; }
  .btn-danger:hover  { background: #a82020; }
  .btn-outline { background: var(--surface); color: var(--accent); border: 1.5px solid var(--accent); }
  .btn-outline:hover { background: var(--surface-2); }
  .btn-sm { padding: 5px 11px; font-size: .82rem; }
  .btn:disabled { opacity: .55; cursor: not-allowed; }
  .login-card .btn-primary { width: 100%; justify-content: center; }

  /* Shell */
  #app { display: none; flex-direction: column; min-height: 100vh; }
  header {
    background: var(--surface); color: var(--text); padding: 0 24px;
    display: flex; align-items: center; justify-content: space-between; height: 54px;
    border-bottom: 2px solid var(--surface-2);
  }
  header h1 { font-size: 1.2rem; letter-spacing: .5px; color: var(--accent); }

  nav { background: var(--surface); border-bottom: 2px solid var(--border); display: flex; padding: 0 24px; }
  nav button {
    padding: 14px 20px; border: none; background: none; cursor: pointer;
    font-size: .9rem; color: var(--text-muted); border-bottom: 3px solid transparent; margin-bottom: -2px;
    font-weight: 500; transition: color .15s;
  }
  nav button.active { color: var(--accent); border-bottom-color: var(--accent); }
  nav button:hover:not(.active) { color: var(--accent); }

  main { padding: 28px; flex: 1; }
  .tab { display: none; }
  .tab.active { display: block; }

  h2 { font-size: 1.1rem; color: var(--accent); margin-bottom: 18px; }

  /* Table */
  .tbl-wrap { overflow-x: auto; border-radius: 8px; box-shadow: 0 1px 6px rgba(22,35,79,.08); }
  table { width: 100%; border-collapse: collapse; background: var(--surface); font-size: .88rem; }
  th { background: var(--surface-2); color: var(--accent); font-weight: 600; padding: 10px 14px; text-align: left; white-space: nowrap; }
  td { padding: 9px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface-2); }

  /* Badges */
  .badge {
    display: inline-block; padding: 2px 9px; border-radius: 12px;
    font-size: .75rem; font-weight: 600; margin: 1px 2px;
  }
  .badge-blue  { background: var(--surface-2); color: var(--accent); }
  .badge-green { background: rgba(46,125,50,.12); color: var(--success); }
  .badge-gray  { background: #ECEFF5; color: var(--text-muted); }
  .badge-red   { background: rgba(211,47,47,.12); color: var(--danger); }

  /* Form */
  .form-row { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .form-row input, .form-row select {
    padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: .88rem; outline: none;
    background: var(--surface); color: var(--text);
  }
  .form-row input:focus, .form-row select:focus { border-color: var(--accent); }

  /* Card */
  .card { background: var(--surface); border-radius: 8px; padding: 20px; margin-bottom: 16px;
          box-shadow: 0 1px 6px rgba(22,35,79,.08); }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .card-header h3 { font-size: 1rem; color: var(--accent); }

  .loading { color: var(--text-muted); padding: 20px; text-align: center; }
  .empty   { color: var(--text-muted); padding: 20px; text-align: center; font-style: italic; }

  /* Tags / chips */
  .tag-chip {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--surface-2); color: var(--accent); border-radius: 14px;
    padding: 3px 10px; font-size: .8rem; margin: 2px;
  }
  .tag-chip button { background: none; border: none; cursor: pointer; color: var(--accent); font-size: .9rem; line-height: 1; padding: 0; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(22,35,79,.45);
    display: flex; align-items: center; justify-content: center; z-index: 999;
  }
  .modal-box {
    background: var(--surface); border-radius: 10px; padding: 28px; min-width: 360px;
    box-shadow: 0 8px 32px rgba(22,35,79,.18); max-height: 90vh; overflow-y: auto;
  }
  .modal-box h3 { color: var(--accent); margin-bottom: 16px; }
  .modal-box label { display: block; font-size: .85rem; color: var(--text-muted); margin: 10px 0 4px; }
  .modal-box input, .modal-box select {
    width: 100%; padding: 8px 12px; border: 1px solid var(--border);
    border-radius: 6px; font-size: .88rem; outline: none;
    background: var(--surface); color: var(--text);
  }
  .modal-box input:focus, .modal-box select:focus { border-color: var(--accent); }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  /* Create-user section */
  .create-user-section {
    background: var(--surface); border-radius: 8px; padding: 16px 20px; margin-bottom: 20px;
    box-shadow: 0 1px 6px rgba(22,35,79,.08);
  }
  .create-user-section h3 { font-size: .95rem; color: var(--accent); margin-bottom: 12px; }

  /* Role card extras */
  .role-section-label {
    font-size: .8rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase;
    letter-spacing: .5px; margin: 12px 0 6px;
  }
  .machine-chip {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--surface-2); color: var(--accent); border-radius: 14px;
    padding: 3px 10px; font-size: .8rem; margin: 2px;
    border: 1px solid var(--border);
  }
  .machine-chip button {
    background: none; border: none; cursor: pointer; color: var(--danger-strong);
    font-size: .9rem; line-height: 1; padding: 0;
  }
  .user-mini-table { width: 100%; border-collapse: collapse; font-size: .83rem; }
  .user-mini-table td { padding: 4px 8px; border-bottom: 1px solid var(--border); }
  .user-mini-table tr:last-child td { border-bottom: none; }
</style>
</head>
<body>

<!-- Login -->
<div id="login-page">
  <div class="login-card">
    <img id="brand-logo-login" class="brand-logo" alt="ROCKY">
    <h1>ROCKY Admin</h1>
    <p class="tagline">Think Like Hustler.</p>
    <p>Đăng nhập để quản lý hệ thống</p>
    <div class="err" id="login-err" style="display:none"></div>
    <label>Tên đăng nhập</label>
    <input id="inp-user" type="text" placeholder="admin" autocomplete="username">
    <label>Mật khẩu</label>
    <input id="inp-pass" type="password" placeholder="••••••••" autocomplete="current-password">
    <button class="btn btn-primary" onclick="doLogin()">Đăng nhập</button>
  </div>
</div>

<!-- App shell -->
<div id="app">
  <header>
    <div style="display:flex;gap:10px;align-items:center">
      <img id="brand-logo-header" class="brand-logo-sm" alt="ROCKY">
      <h1>ROCKY Admin</h1>
    </div>
    <div style="display:flex;gap:12px;align-items:center">
      <span id="admin-label" style="font-size:.85rem;opacity:.85">admin</span>
      <button class="btn btn-outline btn-sm" onclick="doLogout()">Đăng xuất</button>
    </div>
  </header>

  <nav>
    <button class="active" onclick="switchTab('users',this)">Người dùng</button>
    <button onclick="switchTab('roles',this)">Danh sách role</button>
    <button onclick="switchTab('machines',this)">Danh sách máy</button>
  </nav>

  <main>
    <!-- Tab: Users -->
    <div class="tab active" id="tab-users">
      <h2>Danh sách người dùng (Keycloak)</h2>

      <div class="create-user-section">
        <h3>+ Tạo người dùng mới</h3>
        <div class="form-row">
          <input id="nu-username"  placeholder="Username *"    style="width:130px">
          <input id="nu-firstname" placeholder="Tên"           style="width:110px">
          <input id="nu-lastname"  placeholder="Họ"            style="width:110px">
          <input id="nu-email"     placeholder="Email"         style="width:180px">
          <input id="nu-password"  type="password" placeholder="Mật khẩu *" style="width:130px">
          <button class="btn btn-primary btn-sm" onclick="createUser()">Tạo</button>
        </div>
        <div id="create-user-err" style="color:var(--danger);font-size:.83rem;display:none"></div>
      </div>

      <div id="users-content"><div class="loading">Đang tải...</div></div>
    </div>

    <!-- Tab: Roles -->
    <div class="tab" id="tab-roles">
      <h2>Danh sách role</h2>

      <div class="card" style="margin-bottom:20px">
        <h3 style="font-size:.95rem;color:var(--accent);margin-bottom:12px">Tạo role mới (Keycloak)</h3>
        <div class="form-row" style="margin-bottom:8px">
          <input id="new-role-name" placeholder="Tên role mới..." style="width:200px">
          <button class="btn btn-primary btn-sm" onclick="createKcRole()">+ Tạo role</button>
        </div>
        <div id="roles-list-actions" style="margin-top:8px"></div>
      </div>

      <div id="roles-content"><div class="loading">Đang tải...</div></div>
    </div>

    <!-- Tab: Machines -->
    <div class="tab" id="tab-machines">
      <h2>Danh sách máy</h2>

      <div class="card" style="margin-bottom:20px">
        <h3 style="font-size:.95rem;color:var(--accent);margin-bottom:12px">+ Thêm máy mới</h3>
        <div class="form-row">
          <input id="nm-alias"       placeholder="Alias *"       style="width:150px">
          <input id="nm-rustdesk-id" placeholder="RustDesk ID"   style="width:130px">
          <input id="nm-note"        placeholder="Ghi chú"       style="width:180px">
          <button class="btn btn-primary btn-sm" onclick="addMachine()">+ Thêm</button>
        </div>
        <div id="add-machine-err" style="color:var(--danger);font-size:.83rem;display:none"></div>
      </div>

      <div id="machines-content"><div class="loading">Đang tải...</div></div>
    </div>
  </main>
</div>

// ── State ──────────────────────────────────────────────────────────────────
let kcRoles     = [];   // [{id, name}]
let allMachines = [];   // [{id, alias, rustdesk_id, note}]
let roleDetails = [];   // [{name, machine_ids, machines, users}]
let allUsers    = [];   // [{id, username, firstName, lastName, email, roles}]

// ── Auth ───────────────────────────────────────────────────────────────────
async function doLogin() {
  const username = document.getElementById('inp-user').value.trim();
  const password = document.getElementById('inp-pass').value;
  const errEl = document.getElementById('login-err');
  errEl.style.display = 'none';
  try {
    const r = await fetch('/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    if (r.ok) {
      document.getElementById('login-page').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      document.getElementById('admin-label').textContent = username;
      loadAll();
    } else {
      errEl.textContent = 'Sai tên đăng nhập hoặc mật khẩu.';
      errEl.style.display = 'block';
    }
  } catch (e) {
    errEl.textContent = 'Lỗi kết nối: ' + e.message;
    errEl.style.display = 'block';
  }
}

document.getElementById('inp-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogout() {
  await fetch('/admin/logout', { method: 'POST' });
  location.reload();
}

// ── Tab switching ──────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

// ── Helpers ────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function fetchKcRoles() {
  try {
    const r = await fetch('/admin/api/keycloak-roles');
    const d = await r.json();
    kcRoles = Array.isArray(d) ? d : [];
  } catch (_) { kcRoles = []; }
}

// ── Load all ───────────────────────────────────────────────────────────────
async function loadAll() {
  await fetchKcRoles();
  await Promise.all([loadUsers(), loadRoles(), loadMachines()]);
}

// ── Users ──────────────────────────────────────────────────────────────────
async function createUser() {
  const username  = document.getElementById('nu-username').value.trim();
  const firstName = document.getElementById('nu-firstname').value.trim();
  const lastName  = document.getElementById('nu-lastname').value.trim();
  const email     = document.getElementById('nu-email').value.trim();
  const password  = document.getElementById('nu-password').value;
  const errEl = document.getElementById('create-user-err');
  errEl.style.display = 'none';
  if (!username || !password) {
    errEl.textContent = 'Username và mật khẩu là bắt buộc.';
    errEl.style.display = 'block';
    return;
  }
  try {
    const r = await fetch('/admin/api/users', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, email, firstName, lastName, password }),
    });
    const data = await r.json();
    if (!r.ok) {
      errEl.textContent = 'Lỗi: ' + (data.error || r.status);
      errEl.style.display = 'block';
      return;
    }
    ['nu-username','nu-firstname','nu-lastname','nu-email','nu-password']
      .forEach(id => { document.getElementById(id).value = ''; });
    await loadUsers();
  } catch (e) {
    errEl.textContent = 'Lỗi: ' + e.message;
    errEl.style.display = 'block';
  }
}

async function loadUsers() {
  const el = document.getElementById('users-content');
  el.innerHTML = '<div class="loading">Đang tải...</div>';
  try {
    const r = await fetch('/admin/api/users');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const users = await r.json();
    allUsers = Array.isArray(users) ? users : [];
    if (!users.length) { el.innerHTML = '<div class="empty">Chưa có user nào.</div>'; return; }
    el.innerHTML = `
      <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>Username</th><th>Tên</th><th>Email</th><th>Roles</th><th>Trạng thái</th><th>Thao tác</th>
        </tr></thead>
        <tbody>
          ${users.map(u => {
            const fullName = [u.firstName, u.lastName].filter(Boolean).join(' ') || '—';
            return `
            <tr id="urow-${u.id}">
              <td><strong>${esc(u.username || '')}</strong></td>
              <td>${esc(fullName)}</td>
              <td>${esc(u.email || '—')}</td>
              <td>${renderUserRoles(u)}</td>
              <td>${u.enabled
                ? '<span class="badge badge-green">Active</span>'
                : '<span class="badge badge-red">Disabled</span>'}</td>
              <td style="white-space:nowrap">
                <button class="btn btn-outline btn-sm"
                  onclick="openRoleEditor('${u.id}','${esc(u.username)}')">Gán role</button>
                <button class="btn btn-sm ${u.enabled ? 'btn-danger' : 'btn-primary'}" style="margin-left:4px"
                  onclick="toggleUser('${u.id}', ${!u.enabled}, this)">${u.enabled ? 'Vô hiệu hoá' : 'Kích hoạt'}</button>
                <button class="btn btn-danger btn-sm" style="margin-left:4px"
                  onclick="deleteUser('${u.id}','${esc(u.username)}')">Xoá</button>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table></div>`;
  } catch (e) {
    el.innerHTML = `<div class="empty" style="color:var(--danger)">Lỗi: ${esc(e.message)}<br>Kiểm tra Keycloak service account đã được cấu hình chưa.</div>`;
  }
}

function renderUserRoles(u) {
  const roles = (u.roles || []).filter(r => !['offline_access','uma_authorization'].includes(r));
  if (!roles.length) return '<span class="badge badge-gray">—</span>';
  return roles.map(r => `<span class="badge badge-blue">${esc(r)}</span>`).join('');
}

async function toggleUser(id, enable, btn) {
  btn.disabled = true;
  try {
    await fetch(`/admin/api/users/${id}/enabled`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ enabled: enable }),
    });
    await loadUsers();
  } catch (e) { alert('Lỗi: ' + e.message); btn.disabled = false; }
}

async function deleteUser(id, username) {
  if (!confirm(`Xoá user "${username}"? Hành động này không thể hoàn tác.`)) return;
  try {
    const r = await fetch(`/admin/api/users/${id}`, { method: 'DELETE' });
    if (!r.ok) { const d = await r.json(); alert('Lỗi: ' + (d.error || r.status)); return; }
    await loadUsers();
  } catch (e) { alert('Lỗi: ' + e.message); }
}

async function openRoleEditor(userId, username) {
  const usersRes = await fetch('/admin/api/users');
  const users = await usersRes.json();
  const user = users.find(u => u.id === userId) || {};
  const currentRoles = user.roles || [];

  const roles = (Array.isArray(kcRoles) ? kcRoles : [])
    .filter(r => !['offline_access','uma_authorization'].includes(r.name));

  const dialog = document.createElement('div');
  dialog.className = 'modal-overlay';
  dialog.innerHTML = `
    <div class="modal-box" style="min-width:320px">
      <h3>Roles của <em>${esc(username)}</em></h3>
      <div style="margin-bottom:18px">
        ${roles.map(role => `
          <label style="display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer">
            <input type="checkbox" value="${esc(role.name)}"
              ${currentRoles.includes(role.name) ? 'checked' : ''}
              style="width:16px;height:16px;accent-color:var(--accent)">
            <span>${esc(role.name)}</span>
          </label>`).join('')}
        ${roles.length === 0 ? '<p style="color:var(--text-muted)">Chưa có realm role nào.</p>' : ''}
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Huỷ</button>
        <button class="btn btn-primary" onclick="saveUserRoles('${userId}', this)">Lưu</button>
      </div>
    </div>`;
  document.body.appendChild(dialog);
}

async function saveUserRoles(userId, btn) {
  const dialog = btn.closest('.modal-overlay');
  const checked   = [...dialog.querySelectorAll('input[type=checkbox]:checked')].map(c => c.value);
  const unchecked = [...dialog.querySelectorAll('input[type=checkbox]:not(:checked)')].map(c => c.value);

  const usersRes = await fetch('/admin/api/users');
  const users = await usersRes.json();
  const user = users.find(u => u.id === userId) || { roles: [] };

  const safeKcRoles = Array.isArray(kcRoles) ? kcRoles : [];
  const toAdd    = safeKcRoles.filter(r => checked.includes(r.name)   && !user.roles.includes(r.name));
  const toRemove = safeKcRoles.filter(r => unchecked.includes(r.name) &&  user.roles.includes(r.name));

  btn.disabled = true;
  try {
    if (toAdd.length)
      await fetch(`/admin/api/users/${userId}/roles`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ roles: toAdd }),
      });
    if (toRemove.length)
      await fetch(`/admin/api/users/${userId}/roles`, {
        method: 'DELETE', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ roles: toRemove }),
      });
    dialog.remove();
    await loadUsers();
  } catch (e) { alert('Lỗi: ' + e.message); btn.disabled = false; }
}

// ── Keycloak role CRUD ─────────────────────────────────────────────────────
async function createKcRole() {
  const name = document.getElementById('new-role-name').value.trim();
  if (!name) return;
  try {
    const r = await fetch('/admin/api/keycloak-roles', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name }),
    });
    const data = await r.json();
    if (!r.ok) { alert('Lỗi: ' + (data.error || r.status)); return; }
    document.getElementById('new-role-name').value = '';
    await fetchKcRoles();
    await loadRoles();
  } catch (e) { alert('Lỗi: ' + e.message); }
}

async function deleteKcRole(name) {
  if (!confirm(`Xoá role "${name}"? Tất cả user có role này sẽ bị thu hồi quyền.`)) return;
  try {
    const r = await fetch(`/admin/api/keycloak-roles/${encodeURIComponent(name)}`, { method: 'DELETE' });
    const data = await r.json();
    if (!r.ok) { alert('Lỗi: ' + (data.error || r.status)); return; }
    await fetchKcRoles();
    await loadRoles();
    await loadUsers();
  } catch (e) { alert('Lỗi: ' + e.message); }
}

function renderRoleDeleteChips() {
  const el = document.getElementById('roles-list-actions');
  const roles = (Array.isArray(kcRoles) ? kcRoles : [])
    .filter(r => !['offline_access','uma_authorization'].includes(r.name));
  if (!roles.length) { el.innerHTML = ''; return; }
  el.innerHTML = '<div style="margin-bottom:6px;color:var(--text-muted);font-size:.82rem">Roles hiện tại:</div>' +
    roles.map(r => `
      <span class="tag-chip">
        ${esc(r.name)}
        <button onclick="deleteKcRole('${esc(r.name)}')" title="Xoá role" style="color:var(--danger)">×</button>
      </span>`).join('');
}

// ── Roles (card view) ──────────────────────────────────────────────────────
async function loadRoles() {
  const el = document.getElementById('roles-content');
  el.innerHTML = '<div class="loading">Đang tải...</div>';
  try {
    const [rolesRes, machinesRes] = await Promise.all([
      fetch('/admin/api/roles'),
      fetch('/admin/api/machines'),
    ]);
    const rolesData = await rolesRes.json();
    allMachines = await machinesRes.json();
    if (!Array.isArray(allMachines)) allMachines = [];

    let warningHtml = '';
    if (rolesData && rolesData.roles !== undefined) {
      roleDetails = Array.isArray(rolesData.roles) ? rolesData.roles : [];
      if (rolesData.kcError) {
        warningHtml = `<div style="background:#fff3cd;border:1px solid #ffc107;padding:10px 14px;
          border-radius:6px;margin-bottom:16px;font-size:.87rem;color:#856404">
          ⚠️ Không thể kết nối Keycloak: ${esc(rolesData.kcError)}<br>
          Hiển thị role từ dữ liệu local (không có thông tin user).
        </div>`;
      }
    } else if (Array.isArray(rolesData)) {
      roleDetails = rolesData;
    } else {
      roleDetails = [];
      el.innerHTML = `<div class="empty" style="color:var(--danger)">Lỗi tải role: ${esc(JSON.stringify(rolesData))}</div>`;
      return;
    }

    renderRoleDeleteChips();

    if (!roleDetails.length) {
      el.innerHTML = warningHtml + '<div class="empty">Chưa có role nào. Tạo role ở trên.</div>';
      return;
    }
    el.innerHTML = warningHtml + roleDetails.map(role => renderRoleCard(role)).join('');
  } catch (e) {
    el.innerHTML = `<div class="empty" style="color:var(--danger)">Lỗi kết nối: ${esc(e.message)}</div>`;
  }
}

function renderRoleCard(role) {
  const users    = role.users    || [];
  const machines = role.machines || [];

  const usersHtml = users.length
    ? `<table class="user-mini-table">
        ${users.map(u => {
          const name = [u.firstName, u.lastName].filter(Boolean).join(' ');
          return `<tr>
            <td><strong>${esc(u.username)}</strong></td>
            <td>${esc(name || '—')}</td>
            <td style="color:var(--text-muted)">${esc(u.email || '')}</td>
            <td style="width:32px">
              <button class="btn btn-danger btn-sm" style="padding:1px 7px;font-size:.8rem"
                onclick="removeUserFromRole('${esc(role.name)}','${esc(u.id)}','${esc(u.username)}')"
                title="Gỡ user khỏi role">×</button>
            </td>
          </tr>`;
        }).join('')}
      </table>`
    : '<div style="color:var(--text-muted);font-size:.85rem">Chưa có user nào được gán role này.</div>';

  const machinesHtml = machines.length
    ? machines.map(m => `
        <span class="machine-chip">
          ${esc(m.alias || m.id)}
          <button onclick="removeMachineFromRole('${esc(role.name)}','${esc(m.id)}')" title="Gỡ máy khỏi role">×</button>
        </span>`).join('')
    : '<span style="color:var(--text-muted);font-size:.85rem">Chưa có máy nào.</span>';

  return `
    <div class="card">
      <div class="card-header">
        <h3>${esc(role.name)}</h3>
        <button class="btn btn-danger btn-sm" onclick="deleteKcRole('${esc(role.name)}')">Xoá role</button>
      </div>

      <div class="role-section-label">
        Người dùng (${users.length})
        <button class="btn btn-outline btn-sm" style="margin-left:10px;font-size:.78rem"
          onclick="openAddUserToRole('${esc(role.name)}')">+ Thêm user</button>
      </div>
      <div style="margin-bottom:12px">${usersHtml}</div>

      <div class="role-section-label">
        Máy được truy cập (${machines.length})
        <button class="btn btn-outline btn-sm" style="margin-left:10px;font-size:.78rem"
          onclick="openAddMachineToRole('${esc(role.name)}')">+ Thêm máy</button>
      </div>
      <div>${machinesHtml}</div>
    </div>`;
}

async function openAddMachineToRole(roleName) {
  const role = roleDetails.find(r => r.name === roleName);
  if (!role) return;
  const currentIds = new Set(role.machine_ids || []);
  const available = allMachines.filter(m => !currentIds.has(m.id));

  if (!available.length) { alert('Tất cả máy đã được thêm vào role này.'); return; }

  const dialog = document.createElement('div');
  dialog.className = 'modal-overlay';
  dialog.innerHTML = `
    <div class="modal-box" style="min-width:360px">
      <h3>Thêm máy vào role <em>${esc(roleName)}</em></h3>
      <div style="max-height:260px;overflow-y:auto;margin-bottom:4px">
        ${available.map(m => `
          <label style="display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer">
            <input type="checkbox" value="${esc(m.id)}" style="width:16px;height:16px;accent-color:var(--accent)">
            <span>${esc(m.alias || m.id)}</span>
            ${m.rustdesk_id ? `<code style="font-size:.75rem;color:var(--text-muted)">${esc(m.rustdesk_id)}</code>` : ''}
          </label>`).join('')}
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Huỷ</button>
        <button class="btn btn-primary" onclick="saveAddMachineToRole('${esc(roleName)}',this)">Thêm</button>
      </div>
    </div>`;
  document.body.appendChild(dialog);
}

async function saveAddMachineToRole(roleName, btn) {
  const dialog = btn.closest('.modal-overlay');
  const selected = [...dialog.querySelectorAll('input[type=checkbox]:checked')].map(c => c.value);
  if (!selected.length) { dialog.remove(); return; }

  const role = roleDetails.find(r => r.name === roleName);
  if (!role) return;
  const newIds = [...new Set([...(role.machine_ids || []), ...selected])];

  btn.disabled = true;
  try {
    await putRoleMachines(roleName, newIds);
    dialog.remove();
    await loadRoles();
  } catch (e) { alert('Lỗi: ' + e.message); btn.disabled = false; }
}

async function removeMachineFromRole(roleName, machineId) {
  const role = roleDetails.find(r => r.name === roleName);
  if (!role) return;
  const newIds = (role.machine_ids || []).filter(id => id !== machineId);
  try {
    await putRoleMachines(roleName, newIds);
    await loadRoles();
  } catch (e) { alert('Lỗi: ' + e.message); }
}

async function putRoleMachines(roleName, machineIds) {
  // Build full mapping from current roleDetails, updating the target role
  const mapping = {};
  for (const r of roleDetails) {
    mapping[r.name] = r.name === roleName ? machineIds : (r.machine_ids || []);
  }
  const res = await fetch('/admin/api/roles', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(mapping),
  });
  if (!res.ok) {
    const d = await res.json();
    throw new Error(d.error || res.status);
  }
}

// ── Role ↔ User management ────────────────────────────────────────────────
async function removeUserFromRole(roleName, userId, username) {
  if (!confirm(`Gỡ user "${username}" khỏi role "${roleName}"?`)) return;
  const roleObj = kcRoles.find(r => r.name === roleName);
  if (!roleObj) { alert('Không tìm thấy role trong danh sách.'); return; }
  try {
    const r = await fetch(`/admin/api/users/${userId}/roles`, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ roles: [roleObj] }),
    });
    if (!r.ok) { const d = await r.json(); alert('Lỗi: ' + (d.error || r.status)); return; }
    await Promise.all([loadRoles(), loadUsers()]);
  } catch (e) { alert('Lỗi: ' + e.message); }
}

async function openAddUserToRole(roleName) {
  const role = roleDetails.find(r => r.name === roleName);
  if (!role) return;
  const existingIds = new Set((role.users || []).map(u => u.id));

  let users = allUsers;
  if (!users.length) {
    const r = await fetch('/admin/api/users');
    users = await r.json();
    allUsers = Array.isArray(users) ? users : [];
  }
  const available = users.filter(u => !existingIds.has(u.id));
  if (!available.length) { alert('Tất cả user đã thuộc role này.'); return; }

  const dialog = document.createElement('div');
  dialog.className = 'modal-overlay';
  dialog.innerHTML = `
    <div class="modal-box" style="min-width:400px">
      <h3>Thêm user vào role <em>${esc(roleName)}</em></h3>
      <div style="max-height:300px;overflow-y:auto;padding:4px 0">
        ${available.map(u => {
          const name = [u.firstName, u.lastName].filter(Boolean).join(' ');
          return `<label style="display:flex;align-items:center;gap:10px;margin-bottom:10px;cursor:pointer">
            <input type="checkbox" value="${esc(u.id)}" style="width:16px;height:16px;accent-color:var(--accent);flex-shrink:0">
            <span>
              <strong>${esc(u.username)}</strong>
              ${name ? `<span style="color:var(--text-muted)"> — ${esc(name)}</span>` : ''}
              <br><span style="color:var(--text-muted);font-size:.78rem">${esc(u.email || '')}</span>
            </span>
          </label>`;
        }).join('')}
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Huỷ</button>
        <button class="btn btn-primary" onclick="saveAddUserToRole('${esc(roleName)}',this)">Thêm</button>
      </div>
    </div>`;
  document.body.appendChild(dialog);
}

async function saveAddUserToRole(roleName, btn) {
  const dialog = btn.closest('.modal-overlay');
  const selected = [...dialog.querySelectorAll('input[type=checkbox]:checked')].map(c => c.value);
  if (!selected.length) { dialog.remove(); return; }
  const roleObj = kcRoles.find(r => r.name === roleName);
  if (!roleObj) { alert('Không tìm thấy role.'); return; }
  btn.disabled = true;
  try {
    await Promise.all(selected.map(userId =>
      fetch(`/admin/api/users/${userId}/roles`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ roles: [roleObj] }),
      })
    ));
    dialog.remove();
    await Promise.all([loadRoles(), loadUsers()]);
  } catch (e) { alert('Lỗi: ' + e.message); btn.disabled = false; }
}

// ── Machines ───────────────────────────────────────────────────────────────
async function loadMachines() {
  const el = document.getElementById('machines-content');
  el.innerHTML = '<div class="loading">Đang tải...</div>';
  try {
    const r = await fetch('/admin/api/machines');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    allMachines = await r.json();
    if (!Array.isArray(allMachines)) allMachines = [];
    if (!allMachines.length) {
      el.innerHTML = '<div class="empty">Chưa có máy nào. Thêm máy ở trên.</div>';
      return;
    }
    el.innerHTML = `
      <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>Alias</th><th>RustDesk ID</th><th>Ghi chú</th><th>Roles</th><th>Thao tác</th>
        </tr></thead>
        <tbody>
          ${allMachines.map(m => `
            <tr>
              <td><strong>${esc(m.alias || '—')}</strong></td>
              <td><code>${esc(m.rustdesk_id || '—')}</code></td>
              <td style="color:var(--text-muted)">${esc(m.note || '—')}</td>
              <td>${(m.roles || []).map(r => `<span class="badge badge-blue">${esc(r)}</span>`).join('') || '<span style="color:var(--text-muted)">—</span>'}</td>
              <td style="white-space:nowrap">
                <button class="btn btn-outline btn-sm"
                  onclick="openEditMachine('${esc(m.id)}')">Sửa</button>
                <button class="btn btn-danger btn-sm" style="margin-left:4px"
                  onclick="deleteMachine('${esc(m.id)}','${esc(m.alias || m.id)}')">Xoá</button>
              </td>
            </tr>`).join('')}
        </tbody>
      </table></div>`;
  } catch (e) {
    el.innerHTML = `<div class="empty" style="color:var(--danger)">Lỗi: ${esc(e.message)}</div>`;
  }
}

async function addMachine() {
  const alias      = document.getElementById('nm-alias').value.trim();
  const rustdesk_id = document.getElementById('nm-rustdesk-id').value.trim();
  const note       = document.getElementById('nm-note').value.trim();
  const errEl = document.getElementById('add-machine-err');
  errEl.style.display = 'none';
  if (!alias) {
    errEl.textContent = 'Alias là bắt buộc.';
    errEl.style.display = 'block';
    return;
  }
  try {
    const r = await fetch('/admin/api/machines', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ alias, rustdesk_id, note }),
    });
    const data = await r.json();
    if (!r.ok) { errEl.textContent = 'Lỗi: ' + (data.error || r.status); errEl.style.display = 'block'; return; }
    ['nm-alias','nm-rustdesk-id','nm-note'].forEach(id => { document.getElementById(id).value = ''; });
    await loadMachines();
  } catch (e) { errEl.textContent = 'Lỗi: ' + e.message; errEl.style.display = 'block'; }
}

function openEditMachine(machineId) {
  const m = allMachines.find(x => x.id === machineId);
  if (!m) return;
  const currentRoles = m.roles || [];
  const roleCheckboxes = (Array.isArray(kcRoles) ? kcRoles : [])
    .filter(r => !['offline_access','uma_authorization'].includes(r.name));
  const rolesHtml = roleCheckboxes.length
    ? roleCheckboxes.map(r => `
        <label style="display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer">
          <input type="checkbox" class="em-role-cb" value="${esc(r.name)}"
            ${currentRoles.includes(r.name) ? 'checked' : ''}
            style="width:16px;height:16px;accent-color:var(--accent)">
          <span>${esc(r.name)}</span>
        </label>`).join('')
    : '<span style="color:var(--text-muted);font-size:.85rem">Chưa load được roles từ Keycloak.</span>';

  const dialog = document.createElement('div');
  dialog.className = 'modal-overlay';
  dialog.innerHTML = `
    <div class="modal-box">
      <h3>Sửa máy</h3>
      <label>Alias *</label>
      <input id="em-alias"       value="${esc(m.alias       || '')}" placeholder="Alias">
      <label>RustDesk ID</label>
      <input id="em-rustdesk-id" value="${esc(m.rustdesk_id || '')}" placeholder="RustDesk ID">
      <label>Ghi chú</label>
      <input id="em-note"        value="${esc(m.note        || '')}" placeholder="Ghi chú">
      <label>Roles được phép truy cập</label>
      <div style="max-height:140px;overflow-y:auto;padding:8px;border:1px solid var(--border);border-radius:6px;margin-top:4px">
        ${rolesHtml}
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Huỷ</button>
        <button class="btn btn-primary" onclick="saveEditMachine('${esc(m.id)}',this)">Lưu</button>
      </div>
    </div>`;
  document.body.appendChild(dialog);
}

async function saveEditMachine(machineId, btn) {
  const dialog = btn.closest('.modal-overlay');
  const alias       = dialog.querySelector('#em-alias').value.trim();
  const rustdesk_id = dialog.querySelector('#em-rustdesk-id').value.trim();
  const note        = dialog.querySelector('#em-note').value.trim();
  const roles       = [...dialog.querySelectorAll('input.em-role-cb:checked')].map(c => c.value);
  if (!alias) { alert('Alias là bắt buộc.'); return; }
  btn.disabled = true;
  try {
    const r = await fetch(`/admin/api/machines/${encodeURIComponent(machineId)}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ alias, rustdesk_id, note, roles }),
    });
    if (!r.ok) { const d = await r.json(); alert('Lỗi: ' + (d.error || r.status)); btn.disabled = false; return; }
    dialog.remove();
    await Promise.all([loadMachines(), loadRoles()]);
  } catch (e) { alert('Lỗi: ' + e.message); btn.disabled = false; }
}

async function deleteMachine(machineId, label) {
  if (!confirm(`Xoá máy "${label}"? Máy cũng sẽ bị xoá khỏi tất cả roles.`)) return;
  try {
    const r = await fetch(`/admin/api/machines/${encodeURIComponent(machineId)}`, { method: 'DELETE' });
    if (!r.ok) { const d = await r.json(); alert('Lỗi: ' + (d.error || r.status)); return; }
    await Promise.all([loadMachines(), loadRoles()]);
  } catch (e) { alert('Lỗi: ' + e.message); }
}
</script>
